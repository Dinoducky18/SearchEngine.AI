<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SearchEngine.AI</title>
<style>
  :root{--bg:#0a0a0a;--panel:#121212;--panel2:#181818;--panel3:#1f1f1f;--red:#e10600;--red2:#ff2b22;--red-dim:#6e0300;--white:#f5f5f5;--grey:#8a8a8a;--line:#262626}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{background:radial-gradient(circle at 50% -8%, #1c1c1c 0%, var(--bg) 55%);color:var(--white);font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 80px}
  .hero{width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:padding .4s}
  .hero.start{min-height:78vh}.hero.compact{min-height:auto;padding-top:30px}
  .logo{font-weight:800;font-size:clamp(30px,6vw,58px);letter-spacing:1px;user-select:none;text-align:center}
  .logo .ai{color:var(--red)}.logo .dot{color:var(--grey)}
  .tagline{color:var(--grey);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin:8px 0 26px;text-align:center}
  .search-bar{display:flex;width:100%;background:var(--panel);border:2px solid var(--line);border-radius:40px;overflow:hidden;transition:.2s}
  .search-bar:focus-within{border-color:var(--red);box-shadow:0 0 30px rgba(225,6,0,.3)}
  .search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-size:18px;padding:19px 26px}
  .search-bar input::placeholder{color:#555}
  .search-bar button{background:var(--red);color:#fff;border:none;padding:0 32px;font-weight:700;letter-spacing:1px;cursor:pointer;font-size:15px}
  .search-bar button:hover{background:var(--red2)}
  .cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
  .cat-btn{background:var(--panel2);border:1px solid var(--line);color:var(--grey);padding:8px 16px;border-radius:22px;font-size:12px;letter-spacing:1px;cursor:pointer;transition:.15s;text-transform:uppercase;font-weight:600}
  .cat-btn:hover,.cat-btn.active{border-color:var(--red);color:#fff;background:#1a0808}
  .browse{width:100%;max-width:1000px;margin-top:24px;display:none;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:14px}
  .browse.show{display:grid;animation:fade .3s}
  .vcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .vcard:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 8px 26px rgba(225,6,0,.18)}
  .vcard .vc-cat{font-size:10px;letter-spacing:1px;color:var(--red);text-transform:uppercase;font-weight:700}
  .vcard .vc-name{font-size:16px;font-weight:700;margin:5px 0 8px}.vcard .vc-stat{font-size:12px;color:var(--grey)}
  .vcard:after{content:"";position:absolute;left:0;bottom:0;height:3px;width:0;background:var(--red);transition:.25s}.vcard:hover:after{width:100%}
  .browse-title{width:100%;max-width:1000px;margin:22px auto 0;color:var(--grey);font-size:13px;letter-spacing:2px;text-transform:uppercase;display:none}
  .browse-title.show{display:block}
  .result{width:100%;max-width:940px;margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:none}
  .result.show{display:block;animation:rise .45s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(28px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .res-head{padding:24px 28px;border-bottom:1px solid var(--line);position:relative;background:linear-gradient(135deg,#1c1c1c,#0d0d0d);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;overflow:hidden}
  .res-head:before{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(100deg,transparent,rgba(225,6,0,.22),transparent);transform:skewX(-18deg);animation:sweep 1.1s ease-out 1}
  @keyframes sweep{from{left:-60%}to{left:130%}}
  .res-title{font-size:27px;font-weight:800;line-height:1.1}.res-sub{color:var(--grey);font-size:13px;margin-top:5px}
  .cat-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:6px;white-space:nowrap;z-index:1}
  .res-body{padding:24px 28px}
  .info p{color:#d2d2d2;line-height:1.7;margin-bottom:12px}
  .section-h{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin:24px 0 12px;border-left:3px solid var(--red);padding-left:10px;font-weight:700}
  .spectable{width:100%;border-collapse:collapse}
  .spectable tr{border-bottom:1px solid var(--line)}
  .spectable td{padding:9px 10px;font-size:14px;vertical-align:top}
  .spectable td.k{color:var(--grey);text-transform:uppercase;font-size:11px;letter-spacing:1px;width:42%}
  .spectable td.v{color:#fff;font-weight:600}
  .facts{list-style:none;columns:2;column-gap:26px}
  @media(max-width:620px){.facts{columns:1}}
  .facts li{padding:8px 0 8px 22px;position:relative;color:#dcdcdc;line-height:1.5;break-inside:avoid;font-size:14px}
  .facts li:before{content:"\25B8";color:var(--red);position:absolute;left:2px;top:8px}
  .ai-box{background:var(--panel2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ai-log{padding:16px;max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:86%;padding:10px 14px;border-radius:12px;line-height:1.5;font-size:14px;animation:fade .25s}
  .msg.user{align-self:flex-end;background:var(--red);color:#fff;border-bottom-right-radius:3px}
  .msg.ai{align-self:flex-start;background:var(--panel3);border:1px solid var(--line);border-bottom-left-radius:3px}.msg.ai b{color:var(--red2)}
  .ai-input{display:flex;border-top:1px solid var(--line)}
  .ai-input input{flex:1;background:transparent;border:none;outline:none;color:#fff;padding:13px 16px;font-size:14px}
  .ai-input input::placeholder{color:#555}
  .ai-input button{background:var(--red);color:#fff;border:none;padding:0 20px;cursor:pointer;font-weight:700}
  .ai-sugg{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .ai-sugg span{background:var(--panel3);border:1px solid var(--line);color:var(--grey);font-size:12px;padding:5px 11px;border-radius:16px;cursor:pointer}
  .ai-sugg span:hover{border-color:var(--red);color:#fff}
  .typing{display:inline-flex;gap:4px}.typing i{width:6px;height:6px;background:var(--grey);border-radius:50%;animation:blink 1s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
  .engine-zone{display:flex;flex-wrap:wrap;gap:18px;align-items:stretch}
  .engine-view{flex:1;min-width:300px;background:linear-gradient(180deg,#0e0e0e,#060606);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:center}
  .tuning{flex:1;min-width:260px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px}
  .tune-row{margin-bottom:14px}.tune-row .tl{font-size:11px;letter-spacing:1px;color:var(--grey);text-transform:uppercase;margin-bottom:7px}
  .opts{display:flex;flex-wrap:wrap;gap:6px}
  .opt{background:#141414;border:1px solid var(--line);color:#bbb;padding:7px 11px;border-radius:8px;font-size:12px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--red);color:#fff}.opt.sel{background:var(--red);border-color:var(--red);color:#fff}
  .tune-note{color:#666;font-size:12px;line-height:1.5}
  .cockpit{margin-top:18px;background:linear-gradient(180deg,#0e0e0e,#050505);border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:center}
  .gauge-wrap{display:flex;flex-direction:column;align-items:center}
  .gauge svg{filter:drop-shadow(0 0 14px rgba(225,6,0,.2))}
  .gauge-label{font-size:10px;letter-spacing:2px;color:var(--grey);text-transform:uppercase;margin-top:4px}
  .digital{font-family:Consolas,monospace;font-size:14px;color:var(--red2);letter-spacing:1px;margin-top:6px}
  .controls{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;justify-content:center}
  .ctl{display:flex;flex-direction:column;align-items:center;gap:7px}
  .ctl-name{font-size:10px;letter-spacing:1px;color:var(--grey);text-transform:uppercase}
  .startbtn{padding:14px 20px;border-radius:12px;border:2px solid #2a7d2a;background:#0e1a0e;color:#7fe07f;font-weight:800;letter-spacing:1px;font-size:13px;cursor:pointer;transition:.12s}
  .startbtn:hover{box-shadow:0 0 16px rgba(60,200,60,.4)}
  .startbtn.on{border-color:var(--red);background:#1a0808;color:var(--red2);box-shadow:0 0 16px rgba(225,6,0,.4)}
  .pedal{width:78px;height:104px;cursor:pointer;user-select:none;perspective:340px}
  .pedal .pad{width:100%;height:100%;border-radius:12px;border:2px solid var(--red-dim);background:repeating-linear-gradient(45deg,#222 0 9px,#1a1a1a 9px 18px);display:flex;align-items:center;justify-content:center;font-weight:800;color:#999;transform:rotateX(12deg);transition:box-shadow .12s,border-color .12s;transform-origin:top center;font-size:11px;text-align:center}
  .pedal.glow .pad{box-shadow:0 0 22px rgba(225,6,0,.55);border-color:var(--red);color:#fff}
  .pedal.brake .pad{border-color:#444;background:repeating-linear-gradient(45deg,#241010 0 9px,#180a0a 9px 18px)}
  .pedal.brake.glow .pad{box-shadow:0 0 22px rgba(255,60,60,.55);border-color:#ff5b52}
  .grip{width:120px;height:50px;border:2px solid var(--red-dim);border-radius:25px;cursor:pointer;user-select:none;background:linear-gradient(180deg,#222,#0e0e0e);position:relative;overflow:hidden;transition:box-shadow .12s,border-color .12s;transform-origin:center}
  .grip .knurl{position:absolute;inset:4px;border-radius:21px;background:repeating-linear-gradient(90deg,#2a2a2a 0 6px,#161616 6px 12px)}
  .grip .marker{position:absolute;top:6px;left:50%;width:5px;height:12px;border-radius:3px;background:var(--red);transform:translateX(-50%);box-shadow:0 0 8px var(--red)}
  .grip.glow{border-color:var(--red);box-shadow:0 0 22px rgba(225,6,0,.5)}
  .lever{position:relative;width:62px;height:150px;background:#0c0c0c;border:2px solid var(--line);border-radius:12px;cursor:pointer;user-select:none;touch-action:none}
  .lever .track{position:absolute;left:50%;top:10px;bottom:10px;width:6px;background:#222;border-radius:3px;transform:translateX(-50%)}
  .lever .handle{position:absolute;left:50%;width:50px;height:22px;border-radius:6px;background:linear-gradient(180deg,#3a0202,#160000);border:2px solid var(--red);transform:translate(-50%,50%);box-shadow:0 3px 10px rgba(0,0,0,.6),0 0 14px rgba(225,6,0,.35)}
  .btn{min-width:70px;padding:11px 14px;border-radius:10px;border:2px solid var(--line);background:#141414;color:#bbb;font-weight:700;font-size:12px;letter-spacing:1px;cursor:pointer;user-select:none;text-align:center;transition:.1s}
  .btn:hover{border-color:var(--red);color:#fff}.btn.glow{transform:scale(.96);border-color:var(--red);color:#fff}
  .ab-btn.active{background:linear-gradient(180deg,#ff7a00,#e10600);border-color:#ff7a00;box-shadow:0 0 26px rgba(255,90,0,.7);color:#fff;animation:abpulse .5s infinite}
  @keyframes abpulse{0%,100%{box-shadow:0 0 22px rgba(255,90,0,.6)}50%{box-shadow:0 0 34px rgba(255,140,0,.9)}}
  .hgate{position:relative;background:#0c0c0c;border:2px solid var(--line);border-radius:10px}
  .gate-slot{position:absolute;width:24px;height:24px;border-radius:50%;background:#161616;border:1px solid #333;color:#888;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transform:translate(-50%,-50%)}
  .gate-slot:hover{border-color:var(--red);color:#fff}.gate-slot.sel{background:var(--red);color:#fff;border-color:var(--red)}
  .knob{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#e10600);box-shadow:0 0 10px rgba(225,6,0,.6);transform:translate(-50%,-50%);transition:left .14s,top .14s;pointer-events:none;z-index:2}
  .paddles{display:flex;align-items:center;gap:8px}
  .paddle{width:30px;height:62px;border-radius:8px;background:linear-gradient(180deg,#222,#0e0e0e);border:2px solid var(--red-dim);color:#ccc;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .paddle.press{border-color:var(--red);color:#fff;box-shadow:0 0 16px rgba(225,6,0,.5);transform:scale(.93)}
  .seqshift{display:flex;flex-direction:column;align-items:center;gap:5px}
  .seq-up,.seq-dn{width:48px;height:28px;border-radius:7px;background:#141414;border:2px solid var(--line);color:#ccc;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .seq-up:hover,.seq-dn:hover{border-color:var(--red);color:#fff}
  .gear-read{min-width:46px;height:46px;border-radius:8px;border:2px solid var(--red-dim);background:#0c0c0c;color:var(--red2);font-family:Consolas,monospace;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .flame{height:14px;display:flex;gap:4px;margin-top:4px;opacity:0;transition:opacity .15s}.flame.on{opacity:1}
  .flame i{width:8px;height:14px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:linear-gradient(180deg,#fff,#ffd23f,#ff7a00,#e10600);animation:flick .18s infinite alternate}
  .flame i:nth-child(2){animation-delay:.06s}.flame i:nth-child(3){animation-delay:.12s}
  @keyframes flick{from{transform:scaleY(.7)}to{transform:scaleY(1.25)}}
  .mute{background:transparent;border:1px solid var(--line);color:var(--grey);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px}
  .mute:hover{border-color:var(--red);color:#fff}
  .keyhint{color:#555;font-size:11px;text-align:center;margin-top:10px;width:100%}
  .noresult{display:none;margin-top:26px;color:var(--grey);text-align:center;font-size:15px}.noresult.show{display:block}.noresult b{color:#fff}
  footer{margin-top:auto;color:#444;font-size:11px;letter-spacing:1px;padding-top:46px;text-align:center}
</style>
</head>

function inferLayout(v){const t=((v.specs.Engine||v.specs.Engines||'')+'').toLowerCase();const cyl=v.syn.cyl||4;
  if(t.includes('rotary')||t.includes('wankel'))return{type:'rotary',cyl:2};
  if(t.includes('radial'))return{type:'radial',cyl:Math.min(cyl,9)};
  if(t.includes('flat')||t.includes('boxer'))return{type:'flat',cyl};
  if(/w16|w12/.test(t))return{type:'W',cyl};
  if(t.includes('v-twin')||t.includes('v twin'))return{type:'V',cyl:2};
  if(/v\d/.test(t))return{type:'V',cyl};
  if(cyl===1)return{type:'single',cyl:1};
  return{type:'inline',cyl};}
function layoutName(v){const l=inferLayout(v),n=l.cyl;
  if(l.type==='rotary')return'Rotary (Wankel)';if(l.type==='radial')return'Radial '+n;

  if(l.type==='W')return'W'+n;if(l.type==='V')return n===2?'V-Twin':'V'+n;

function buildArmament(v){const a=JET_ARM[v.name];

    facts:["It carried no weapons at all - it simply outran threats.","Its only defence was to fly higher and faster than any missile.","Onboard cameras could survey 100,000 square miles in an hour.","It spied from the very edge of space.","Over 4,000 missiles were fired at Blackbirds - none ever hit.","Its crew wore full pressure suits like astronauts."]};
  const gun=WEAPONS[a.gun]||{n:a.gun,cal:'-',rof:'-',ammo:'-',f:[]};
  const msls=(a.aam||[]).map(k=>MSL[k]||{n:k,t:'-',f:[]});
  const ir=msls.filter(m=>/IR|Short/.test(m.t)).map(m=>m.n).join(', ')||'-';
  const rdr=msls.filter(m=>/radar|Medium|long|ramjet/i.test(m.t)).map(m=>m.n).join(', ')||'-';
  const agm=a.agm&&MSL[a.agm]?MSL[a.agm].n:(a.agm||'-');
  const specs=[['Internal cannon',gun.n],['Cannon calibre',gun.cal],['Rate of fire',gun.rof],['Ammunition',gun.ammo],['Short-range AAM',ir],['Medium/long AAM',rdr],['Air-to-ground',agm],['Hardpoints',a.hp||'-'],['Max weapons load',a.pay||'-'],['Fire control',a.radar||'-']];
  let facts=[];gun.f.forEach(x=>facts.push(x));msls.forEach(m=>m.f.forEach(x=>facts.push(x)));if(a.extra)a.extra.forEach(x=>facts.push(x));
  const seen=new Set();facts=facts.filter(x=>{const k=x.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  while(facts.length<10){const fillers=[`It is armed with a ${gun.n!=='No internal gun'?gun.cal+' cannon':'missile-only loadout'}.`,`It can carry weapons on ${a.hp||'several'} hardpoints.`,`Its fire-control system uses ${a.radar||'an onboard radar'}.`,`Its air-to-air missiles let it fight beyond visual range.`,`Modern missiles let it strike targets it can barely see.`];facts.push(fillers[facts.length%fillers.length]);}
  return {specs,facts:facts.slice(0,10)};}

  if(has('induction','turbo','supercharg','aspirated','boost','twin-charge'))return v.syn.type==='piston'?`Stock, the ${v.name} is ${indName(inferInduction(v)).toLowerCase()}. In the tuning panel you can swap its induction and hear it change.`:`The ${v.name} uses ${v.syn.type==='turbine'?'a gas turbine':v.syn.type==='electric'?'an electric motor':'a steam engine'}, so turbos don't apply.`;
  if(has('engine','motor','powertrain','cylinder','turbine','layout')){const eng=find('engine')||find('engines')||find('drivetrain')||find('drive')||find('type');const pw=find('power')||find('thrust');return `It is powered by ${eng||'its listed powerplant'}${pw?`, producing ${pw}`:''}.${v.syn.type==='piston'?' Layout: '+layoutName(v)+'.':''}`;}
  if(has('power','horsepower','hp','thrust','strong')){const pw=find('power')||find('thrust');return pw?`The ${v.name} produces ${pw}.`:`See the spec table above.`;}
  if(has('cost','price','much','expensive','buy','worth','dollar')){const pr=find('price')||find('cost');return pr?`It costs roughly ${pr}.`:`There's no simple sticker price for the ${v.name}.`;}
  if(has('weight','heavy','weigh','mtow')){const w=find('weight')||find('mtow');return w?`It weighs about ${w}.`:`Weight isn't listed for the ${v.name}.`;}
  if(has('backfire','pop','bang','crackle'))return v.syn.type==='piston'?`Fit a Sport or Straight-Pipe exhaust, rev it, then lift off - the ${v.name} will crackle and bang on the overrun.`:`The ${v.name} doesn't backfire - that's a piston-engine thing.`;
  if(has('start','ignition','crank'))return `Hit the green START button in the cockpit - you'll hear it crank over and catch, then idle.`;
  if(has('rev','rpm','redline','tach'))return v.gauge.type==='rpm'?`Its gauge maxes near ${v.gauge.max.toLocaleString()} ${v.gauge.unit}.`:`It uses a ${v.gauge.label.toLowerCase()} gauge, not engine RPM.`;
  if(has('afterburner','reheat'))return v.ctl.afterburner?`Yes - the ${v.name} has an afterburner.`:`No, the ${v.name} doesn't use an afterburner.`;
  if(has('gear','shift','transmission','clutch','paddle','stick'))return v.ctl.shifter?`It uses a ${v.ctl.shifter==='manual'?'manual gear stick':v.ctl.shifter==='paddle'?'paddle-shift gearbox':'sequential gearbox'} with ${v.gears} gears.`:`The ${v.name} has no manual gearbox.`;
  if(has('range','far','distance')){const r=find('range');return r?`Its range is about ${r}.`:`Range isn't listed for the ${v.name}.`;}
  return `${v.story} Ask me about its speed, engine, induction, price, gearbox, or history.`;}
function wireAI(v){const log=document.getElementById('aiLog'),input=document.getElementById('aiInput'),send=document.getElementById('aiSend');
  const push=(t,who)=>{const d=document.createElement('div');d.className='msg '+who;d.innerHTML=t;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;};
  const ask=()=>{const x=input.value.trim();if(!x)return;push(x,'user');input.value='';const ty=push('<span class="typing"><i></i><i></i><i></i></span>','ai');setTimeout(()=>{ty.innerHTML=aiAnswer(v,x);log.scrollTop=log.scrollHeight;},460+Math.random()*340);};
  send.onclick=ask;input.addEventListener('keydown',e=>{if(e.key==='Enter')ask();});document.querySelectorAll('#aiSugg span').forEach(s=>s.onclick=()=>{input.value=s.textContent;ask();});}
function findVehicle(query){const q=query.trim().toLowerCase();if(!q)return null;let best=null,bs=0;for(const v of DB){const hay=[v.name.toLowerCase(),...v.aliases,v.maker.toLowerCase()].join(' ');let sc=0;if(v.name.toLowerCase()===q)sc=100;else if(v.aliases.includes(q))sc=92;else if(v.name.toLowerCase().includes(q))sc=64;else if(v.aliases.some(a=>a.includes(q)||q.includes(a)))sc=52;else if(v.maker.toLowerCase().includes(q))sc=44;else if(hay.split(/\s+/).some(w=>w.length>2&&q.includes(w)))sc=32;if(sc>bs){bs=sc;best=v;}}return bs>=32?best:null;}
function doSearch(){const q=document.getElementById('q').value,v=findVehicle(q);if(v)render(v);else{document.getElementById('result').classList.remove('show');document.getElementById('browse').classList.remove('show');document.getElementById('browseTitle').classList.remove('show');const nr=document.getElementById('noresult');nr.innerHTML=q.trim()?`No match for <b>"${q}"</b>. Try a category below, or names like LFA, Hellcat, MiG-29, Mallard, Sea-Doo.`:`Type a vehicle name, or pick a category below.`;nr.classList.add('show');document.getElementById('hero').classList.remove('start');document.getElementById('hero').classList.add('compact');}}
function showCategory(cat){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));const list=cat==='All'?DB:DB.filter(v=>v.cat===cat),grid=document.getElementById('browse');
  grid.innerHTML=list.map(v=>{const stat=v.gauge.type==='rpm'&&v.gauge.max>1500?`${v.topSpeed.toLocaleString()} mph &middot; ${v.gauge.max.toLocaleString()} rpm`:`${v.topSpeed.toLocaleString()} mph`;return `<div class="vcard" data-name="${v.name}"><div class="vc-cat">${v.cat}</div><div class="vc-name">${v.name}</div><div class="vc-stat">${stat}</div></div>`;}).join('');
  grid.classList.add('show');const bt=document.getElementById('browseTitle');bt.textContent=`${list.length} ${cat==='All'?'vehicles':cat.toLowerCase()+'s'} - tap one`;bt.classList.add('show');
  document.getElementById('result').classList.remove('show');document.getElementById('noresult').classList.remove('show');document.getElementById('hero').classList.remove('start');document.getElementById('hero').classList.add('compact');
  grid.querySelectorAll('.vcard').forEach(c=>c.onclick=()=>{const v=DB.find(x=>x.name===c.dataset.name);if(v)render(v);});}
const catsEl=document.getElementById('cats');CATS.forEach(c=>{const b=document.createElement('button');b.className='cat-btn';b.dataset.cat=c;b.textContent=c==='All'?'Browse All':(c==='Fighter Jet'?'Fighter Jets':c+'s');b.onclick=()=>showCategory(c);catsEl.appendChild(b);});
document.getElementById('go').onclick=doSearch;document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
