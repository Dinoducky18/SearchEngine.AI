<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SearchEngine.AI</title>
<style>
  :root{
    --bg:#070708;--panel:rgba(20,20,23,.72);--panel-solid:#121214;--panel2:rgba(28,28,32,.7);--panel3:#1f1f24;
    --acc:#e10600;--acc2:#ff2b22;--red:#e10600;--white:#f3f4f6;--grey:#8b8d94;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
    --glass:saturate(140%) blur(14px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  html{scroll-behavior:smooth}
  body{background:
      radial-gradient(1100px 620px at 50% -12%, color-mix(in srgb,var(--acc) 16%,transparent) 0%, transparent 60%),
      radial-gradient(900px 700px at 85% 8%, rgba(40,42,55,.5), transparent 55%),
      radial-gradient(circle at 50% 120%, #16161b 0%, var(--bg) 60%);
    color:var(--white);font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 90px;
    transition:background .6s ease;overflow-x:hidden}
  #bgfx{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}
  ::selection{background:color-mix(in srgb,var(--acc) 55%,transparent)}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-track{background:#0c0c0e}
  ::-webkit-scrollbar-thumb{background:linear-gradient(var(--acc),var(--acc2));border-radius:8px;border:2px solid #0c0c0e}

  .hero{width:100%;max-width:780px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:min-height .5s cubic-bezier(.2,.8,.2,1),padding .5s}
  .hero.start{min-height:80vh}.hero.compact{min-height:auto;padding-top:34px}
  .logo{font-weight:800;font-size:clamp(32px,6.4vw,62px);letter-spacing:1px;user-select:none;text-align:center;line-height:1;
    text-shadow:0 2px 30px color-mix(in srgb,var(--acc) 30%,transparent);animation:logoIn .8s cubic-bezier(.2,.9,.2,1)}
  @keyframes logoIn{from{opacity:0;transform:translateY(16px) scale(.96);filter:blur(6px)}to{opacity:1;transform:none;filter:none}}
  .logo .ai{background:linear-gradient(120deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo .dot{color:var(--grey)}
  .tagline{color:var(--grey);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 28px;text-align:center;animation:fadeUp .9s .1s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .search-bar{display:flex;width:100%;background:var(--panel);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
    border:1.5px solid var(--line2);border-radius:44px;overflow:hidden;transition:.25s;box-shadow:0 10px 40px rgba(0,0,0,.45);animation:fadeUp .9s .15s both}
  .search-bar:focus-within{border-color:var(--acc);box-shadow:0 0 0 4px color-mix(in srgb,var(--acc) 18%,transparent),0 14px 50px color-mix(in srgb,var(--acc) 22%,transparent)}
  .search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-size:18px;padding:20px 26px}
  .search-bar input::placeholder{color:#5a5b62}
  .search-bar button{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;padding:0 34px;font-weight:800;letter-spacing:1px;cursor:pointer;font-size:15px;transition:.18s;position:relative}
  .search-bar button:hover{filter:brightness(1.12)}
  .search-bar button:active{transform:scale(.97)}

  .cats{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:20px;animation:fadeUp .9s .2s both}
  .cat-btn{background:var(--panel2);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line);color:var(--grey);padding:9px 17px;border-radius:24px;font-size:12px;letter-spacing:1px;cursor:pointer;transition:.2s;text-transform:uppercase;font-weight:700}
  .cat-btn:hover{transform:translateY(-2px);color:#fff;border-color:var(--line2)}
  .cat-btn:active{transform:translateY(0) scale(.96)}
  .cat-btn.active{border-color:var(--acc);color:#fff;background:color-mix(in srgb,var(--acc) 18%,#150808);box-shadow:0 6px 22px color-mix(in srgb,var(--acc) 25%,transparent)}

  .browse{width:100%;max-width:1080px;margin-top:26px;display:none;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px}
  .browse.show{display:grid}
  .vcard{background:var(--panel);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line);border-radius:18px;cursor:pointer;transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .25s,border-color .25s;position:relative;overflow:hidden;display:flex;flex-direction:column;transform-style:preserve-3d}
  .vcard.card-in{animation:cardIn .5s cubic-bezier(.2,.8,.2,1)}
  @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  .vcard:hover{border-color:var(--cacc,var(--acc));box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 30px color-mix(in srgb,var(--cacc,var(--acc)) 22%,transparent)}
  .card-photo{position:relative;height:138px;overflow:hidden;background:linear-gradient(135deg,#15151a,#0c0c0e)}
  .card-photo .cp-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .4s}
  .card-photo .cp-art svg{width:84%;height:84%;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
  .card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.06);transition:opacity .6s,transform 7s ease-out}
  .card-photo.has img{opacity:1;transform:scale(1)}
  .card-photo.has .cp-art{opacity:0}
  .card-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(8,8,10,.85))}
  .vc-cat{font-size:10px;letter-spacing:1.4px;color:var(--cacc,var(--acc));text-transform:uppercase;font-weight:800;padding:12px 16px 0}
  .vc-name{font-size:16.5px;font-weight:800;margin:4px 0 6px;padding:0 16px;line-height:1.18}
  .vc-stat{font-size:12px;color:var(--grey);padding:0 16px 15px}
  .vcard:after{content:"";position:absolute;left:0;bottom:0;height:3px;width:0;background:linear-gradient(90deg,var(--cacc,var(--acc)),var(--acc2));transition:width .3s}
  .vcard:hover:after{width:100%}

  .browse-title{width:100%;max-width:1080px;margin:24px auto 0;color:var(--grey);font-size:13px;letter-spacing:2px;text-transform:uppercase;display:none}
  .browse-title.show{display:block;animation:fadeUp .5s both}

  .result{width:100%;max-width:960px;margin-top:28px;background:var(--panel);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--line2);border-radius:22px;overflow:hidden;display:none;box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .result.show{display:block;animation:rise .55s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(34px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .res-head{padding:26px 30px;border-bottom:1px solid var(--line);position:relative;background:linear-gradient(135deg,color-mix(in srgb,var(--acc) 12%,#1a1a1f),#0c0c0e);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;overflow:hidden}
  .res-head:before{content:"";position:absolute;top:0;left:-60%;width:55%;height:100%;background:linear-gradient(100deg,transparent,color-mix(in srgb,var(--acc) 30%,transparent),transparent);transform:skewX(-18deg);animation:sweep 1.2s ease-out 1}
  @keyframes sweep{from{left:-60%}to{left:140%}}
  .res-title{font-size:29px;font-weight:800;line-height:1.1;letter-spacing:.3px}.res-sub{color:var(--grey);font-size:13px;margin-top:6px}
  .cat-badge{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;border-radius:8px;white-space:nowrap;z-index:1;box-shadow:0 6px 18px color-mix(in srgb,var(--acc) 35%,transparent)}
  .res-body{padding:24px 30px}

  /* hero photo banner */
  .photo-wrap{position:relative;width:100%;height:clamp(210px,40vw,440px);border-radius:18px;overflow:hidden;margin-bottom:22px;background:#0b0b0d;border:1px solid var(--line)}
  .photo-wrap .ph-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.7}
  .photo-wrap .ph-art svg{width:62%;height:74%;filter:drop-shadow(0 12px 30px rgba(0,0,0,.55))}
  .photo-wrap.has-photo .ph-art{opacity:0;transition:opacity .6s}
  .vehphoto{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s}
  .vehphoto.in{opacity:1;animation:kenburns 26s ease-in-out infinite alternate}
  @keyframes kenburns{from{transform:scale(1.02) translate(0,0)}to{transform:scale(1.12) translate(-1.5%,-2%)}}
  .ph-shimmer{position:absolute;inset:0;background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.07) 50%,transparent 80%);background-size:220% 100%;animation:shimmer 1.5s infinite;opacity:0}
  .photo-wrap.loading .ph-shimmer{opacity:1}
  @keyframes shimmer{from{background-position:180% 0}to{background-position:-80% 0}}
  .ph-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(7,7,9,.9))}
  .ph-cap{position:absolute;left:22px;bottom:18px;z-index:2;display:flex;flex-direction:column;gap:3px;text-shadow:0 2px 10px rgba(0,0,0,.8)}
  .ph-name{font-size:clamp(20px,3.4vw,30px);font-weight:800}
  .ph-sub{font-size:12.5px;color:#d8d9de;letter-spacing:.5px}
  .ph-badge{position:absolute;right:16px;top:14px;z-index:2;font-size:10px;font-weight:800;letter-spacing:1.5px;color:#fff;background:color-mix(in srgb,var(--acc) 80%,#000);padding:5px 10px;border-radius:7px;opacity:.92;box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .photo-wrap.art-only .ph-badge{background:#2a2a30;color:#9a9ba2}
  .photo-wrap.art-only .ph-badge:after{content:" (illustration)";font-weight:600}

  .info p{color:#d4d5da;line-height:1.75;margin-bottom:13px}
  .section-h{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin:26px 0 13px;border-left:3px solid var(--acc);padding-left:11px;font-weight:800}
  .spectable{width:100%;border-collapse:collapse}
  .spectable tr{border-bottom:1px solid var(--line);transition:background .15s}
  .spectable tr:hover{background:color-mix(in srgb,var(--acc) 6%,transparent)}
  .spectable td{padding:10px 11px;font-size:14px;vertical-align:top}
  .spectable td.k{color:var(--grey);text-transform:uppercase;font-size:11px;letter-spacing:1px;width:42%}
  .spectable td.v{color:#fff;font-weight:600}
  .facts{list-style:none;columns:2;column-gap:28px}
  @media(max-width:620px){.facts{columns:1}}
  .facts li{padding:9px 0 9px 24px;position:relative;color:#dcdce1;line-height:1.55;break-inside:avoid;font-size:14px}
  .facts li:before{content:"\25B8";color:var(--acc);position:absolute;left:3px;top:9px}

  .ai-box{background:var(--panel2);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .ai-log{padding:16px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:86%;padding:11px 15px;border-radius:14px;line-height:1.55;font-size:14px;animation:msgIn .3s cubic-bezier(.2,.8,.2,1)}
  @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border-bottom-right-radius:4px}
  .msg.ai{align-self:flex-start;background:var(--panel3);border:1px solid var(--line);border-bottom-left-radius:4px}.msg.ai b{color:var(--acc2)}
  .ai-input{display:flex;border-top:1px solid var(--line)}
  .ai-input input{flex:1;background:transparent;border:none;outline:none;color:#fff;padding:14px 16px;font-size:14px}
  .ai-input input::placeholder{color:#5a5b62}
  .ai-input button{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;padding:0 22px;cursor:pointer;font-weight:800}
  .ai-input button:active{transform:scale(.96)}
  .ai-sugg{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .ai-sugg span{background:var(--panel3);border:1px solid var(--line);color:var(--grey);font-size:12px;padding:6px 12px;border-radius:18px;cursor:pointer;transition:.18s}
  .ai-sugg span:hover{border-color:var(--acc);color:#fff;transform:translateY(-1px)}
  .typing{display:inline-flex;gap:4px}.typing i{width:6px;height:6px;background:var(--grey);border-radius:50%;animation:blink 1s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .engine-zone{display:flex;flex-wrap:wrap;gap:18px;align-items:stretch}
  .engine-view{flex:1;min-width:300px;background:radial-gradient(circle at 50% 30%,#141418,#060607);border:1px solid var(--line);border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:center;transition:box-shadow .2s}
  .tuning{flex:1;min-width:260px;background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:18px}
  .tune-row{margin-bottom:15px}.tune-row .tl{font-size:11px;letter-spacing:1px;color:var(--grey);text-transform:uppercase;margin-bottom:8px}
  .opts{display:flex;flex-wrap:wrap;gap:7px}
  .opt{background:#141417;border:1px solid var(--line);color:#bcbdc4;padding:8px 12px;border-radius:9px;font-size:12px;cursor:pointer;transition:.15s}
  .opt:hover{border-color:var(--acc);color:#fff;transform:translateY(-1px)}
  .opt:active{transform:translateY(0) scale(.95)}
  .opt.sel{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:var(--acc);color:#fff;box-shadow:0 4px 16px color-mix(in srgb,var(--acc) 30%,transparent)}
  .tune-note{color:#6c6d74;font-size:12px;line-height:1.55}.tune-note b{color:#c9cad0}

  .cockpit{margin-top:0;background:radial-gradient(circle at 50% 0,#141418,#050506);border:1px solid var(--line);border-radius:18px;padding:22px;display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:center}
  .gauge-wrap{display:flex;flex-direction:column;align-items:center}
  .gauge svg{filter:drop-shadow(0 0 16px color-mix(in srgb,var(--acc) 22%,transparent))}
  .gauge .g-red{stroke:var(--acc)}
  .gauge .g-ndl{stroke:var(--acc);will-change:transform}
  .gauge .g-hub{fill:var(--acc)}
  .gauge-label{font-size:10px;letter-spacing:2px;color:var(--grey);text-transform:uppercase;margin-top:5px}
  .digital{font-family:Consolas,monospace;font-size:15px;color:var(--acc2);letter-spacing:1px;margin-top:7px;text-shadow:0 0 10px color-mix(in srgb,var(--acc) 40%,transparent)}

  .controls{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;justify-content:center}
  .ctl{display:flex;flex-direction:column;align-items:center;gap:7px}
  .ctl-name{font-size:10px;letter-spacing:1px;color:var(--grey);text-transform:uppercase}
  .startbtn{padding:14px 20px;border-radius:13px;border:2px solid #2a7d2a;background:linear-gradient(180deg,#10240f,#0a160a);color:#7fe07f;font-weight:800;letter-spacing:1px;font-size:13px;cursor:pointer;transition:.15s}
  .startbtn:hover{box-shadow:0 0 20px rgba(60,200,60,.45)}
  .startbtn:active{transform:scale(.95)}
  .startbtn.on{border-color:var(--acc);background:linear-gradient(180deg,#220a0a,#150707);color:var(--acc2);box-shadow:0 0 22px color-mix(in srgb,var(--acc) 45%,transparent)}
  .pedal{width:80px;height:108px;cursor:pointer;user-select:none;perspective:340px}
  .pedal .pad{width:100%;height:100%;border-radius:13px;border:2px solid var(--acc);background:repeating-linear-gradient(45deg,#242427 0 9px,#1a1a1c 9px 18px);display:flex;align-items:center;justify-content:center;font-weight:800;color:#9a9ba2;transform:rotateX(12deg);transition:box-shadow .12s,border-color .12s;transform-origin:top center;font-size:11px;text-align:center}
  .pedal.glow .pad{box-shadow:0 0 26px color-mix(in srgb,var(--acc) 55%,transparent);border-color:var(--acc);color:#fff}
  .pedal.brake .pad{border-color:#444;background:repeating-linear-gradient(45deg,#281212 0 9px,#190a0a 9px 18px)}
  .pedal.brake.glow .pad{box-shadow:0 0 24px rgba(255,70,70,.55);border-color:#ff5b52}
  .grip{width:122px;height:52px;border:2px solid var(--acc);border-radius:26px;cursor:pointer;user-select:none;background:linear-gradient(180deg,#242427,#0e0e10);position:relative;overflow:hidden;transition:box-shadow .12s,border-color .12s,transform .1s}
  .grip .knurl{position:absolute;inset:4px;border-radius:22px;background:repeating-linear-gradient(90deg,#2c2c30 0 6px,#161618 6px 12px)}
  .grip .marker{position:absolute;top:6px;left:50%;width:5px;height:13px;border-radius:3px;background:var(--acc);transform:translateX(-50%);box-shadow:0 0 8px var(--acc)}
  .grip.glow{border-color:var(--acc);box-shadow:0 0 24px color-mix(in srgb,var(--acc) 50%,transparent)}
  .lever{position:relative;width:64px;height:152px;background:#0c0c0e;border:2px solid var(--line2);border-radius:13px;cursor:pointer;user-select:none;touch-action:none}
  .lever .track{position:absolute;left:50%;top:10px;bottom:10px;width:6px;background:#222;border-radius:3px;transform:translateX(-50%)}
  .lever .handle{position:absolute;left:50%;width:52px;height:23px;border-radius:7px;background:linear-gradient(180deg,color-mix(in srgb,var(--acc) 45%,#160000),#160000);border:2px solid var(--acc);transform:translate(-50%,50%);box-shadow:0 3px 10px rgba(0,0,0,.6),0 0 16px color-mix(in srgb,var(--acc) 40%,transparent)}
  .btn{min-width:72px;padding:11px 14px;border-radius:11px;border:2px solid var(--line2);background:#141417;color:#bcbdc4;font-weight:700;font-size:12px;letter-spacing:1px;cursor:pointer;user-select:none;text-align:center;transition:.12s}
  .btn:hover{border-color:var(--acc);color:#fff}.btn:active,.btn.glow{transform:scale(.95);border-color:var(--acc);color:#fff}
  .ab-btn.active{background:linear-gradient(180deg,#ff7a00,var(--acc));border-color:#ff7a00;box-shadow:0 0 28px rgba(255,90,0,.7);color:#fff;animation:abpulse .5s infinite}
  @keyframes abpulse{0%,100%{box-shadow:0 0 22px rgba(255,90,0,.6)}50%{box-shadow:0 0 38px rgba(255,150,0,.95)}}
  .hgate{position:relative;background:transparent;border:none}
  .gate-slot{position:absolute;width:24px;height:24px;border-radius:50%;background:#161618;border:1px solid #333;color:#888;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transform:translate(-50%,-50%)}
  .gate-slot:hover{border-color:var(--acc);color:#fff}.gate-slot.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
  .knob{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,var(--acc));box-shadow:0 0 10px color-mix(in srgb,var(--acc) 60%,transparent);transform:translate(-50%,-50%);transition:left .14s,top .14s;pointer-events:none;z-index:2}
  .paddles{display:flex;align-items:center;gap:8px}
  .paddle{width:32px;height:64px;border-radius:9px;background:linear-gradient(180deg,#242427,#0e0e10);border:2px solid var(--acc);color:#ccc;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.1s}
  .paddle.press{border-color:var(--acc);color:#fff;box-shadow:0 0 18px color-mix(in srgb,var(--acc) 50%,transparent);transform:scale(.92)}
  .seqshift{display:flex;flex-direction:column;align-items:center;gap:5px}
  .seq-up,.seq-dn{width:50px;height:29px;border-radius:8px;background:#141417;border:2px solid var(--line2);color:#ccc;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  .seq-up:hover,.seq-dn:hover{border-color:var(--acc);color:#fff}.seq-up:active,.seq-dn:active{transform:scale(.94)}
  .gear-read{min-width:48px;height:48px;border-radius:9px;border:2px solid var(--acc);background:#0c0c0e;color:var(--acc2);font-family:Consolas,monospace;font-size:23px;font-weight:700;display:flex;align-items:center;justify-content:center;text-shadow:0 0 10px color-mix(in srgb,var(--acc) 50%,transparent)}
  .flame{height:14px;display:flex;gap:4px;margin-top:4px;opacity:0;transition:opacity .15s}.flame.on{opacity:1}
  .flame i{width:8px;height:14px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:linear-gradient(180deg,#fff,#ffd23f,#ff7a00,var(--acc));animation:flick .18s infinite alternate}
  .flame i:nth-child(2){animation-delay:.06s}.flame i:nth-child(3){animation-delay:.12s}
  @keyframes flick{from{transform:scaleY(.7)}to{transform:scaleY(1.25)}}
  .mute{background:transparent;border:1px solid var(--line2);color:var(--grey);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:12px;transition:.15s}
  .mute:hover{border-color:var(--acc);color:#fff}.mute:active{transform:scale(.95)}

function inferInduction(v){const t=((v.specs.Engine||v.specs.Engines||'')+'').toLowerCase();if(t.includes('twin-charge'))return'Twin';if(t.includes('supercharg'))return'SC';if(t.includes('turbo'))return'Turbo';return'NA';}
function inferLayout(v){const t=((v.specs.Engine||v.specs.Engines||'')+'').toLowerCase();const cyl=v.syn.cyl||4;
  if(t.includes('rotary')||t.includes('wankel'))return{type:'rotary',cyl:2};
  if(t.includes('radial'))return{type:'radial',cyl:Math.min(cyl,9)};
  if(t.includes('flat')||t.includes('boxer'))return{type:'flat',cyl};
  if(/w16|w12/.test(t))return{type:'W',cyl};
  if(t.includes('v-twin')||t.includes('v twin'))return{type:'V',cyl:2};
  if(/v\d/.test(t))return{type:'V',cyl};
  if(cyl===1)return{type:'single',cyl:1};
  return{type:'inline',cyl};}
function layoutName(v){const l=inferLayout(v),n=l.cyl;
  if(l.type==='rotary')return'Rotary (Wankel)';if(l.type==='radial')return'Radial '+n;

  /* ===== REAL ENGINE LIBRARY (Creative-Commons recordings from Wikimedia Commons) ===== */
  /* Files resolved & fetched at runtime in the browser (CORS-enabled), decoded, looped,

  var NAME2FILE={
    "Lexus LFA":"Lexus LFA revving 1LR-GUE (2009).ogg"

  function pickCommons(v){
    if(NAME2FILE[v.name])return NAME2FILE[v.name];
    var cyl=(v.syn&&v.syn.cyl)||0, t=v.syn&&v.syn.type;
    if(v.cat==='Bike'&&t==='piston')return (cyl>=4)?"WWS MotorcycleTOMOSD-9.ogg":"Activa Sound.ogg";
    if(v.cat==='Car'&&t==='piston'){
      if(cyl>=12)return "Ferrari 250 GTO, Engine Sound.ogg";
      if(cyl>=8)return "Ferrari 250 GTO, Engine Sound.ogg";
      if(cyl===5)return "5 cylinder engine sound.ogg";
      return "Lexus LFA revving 1LR-GUE (2009).ogg";
    }
    if(t==='steam')return "Steam engine.ogg";
    if(v.cat==='Car'||v.cat==='Boat')return "Starting a car and driving.ogg";
    return null; /* jets / turbines / electric: no clean CC loop -> keep synth */
  }
  var URLCACHE={};
  function resolveCommons(file){

      var pages=j&&j.query&&j.query.pages,info=null;

  }
